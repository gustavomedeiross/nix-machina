source_directories:
  - ~/vault

repositories:
  - path: /Volumes/hdd-seagate/vault-backup
    label: hdd-seagate

source_directories_must_exist: true
one_file_system: true

exclude_caches: true
exclude_if_present:
  - .nobackup
exclude_patterns:
  - .DS_Store
  - Thumbs.db

compression: lz4
# Passphrase is set via BORG_PASSPHRASE env var in vault-backup.sh
# to avoid macOS TMPDIR path issues with agenix at build time.

checkpoint_interval: 300
retries: 3
retry_wait: 30
lock_wait: 60

keep_daily: 7
keep_weekly: 4
keep_monthly: 12
keep_yearly: 5

statistics: true

checks:
  - name: repository
    frequency: 2 weeks
  - name: archives
    frequency: 2 weeks
  - name: data
    frequency: 3 months
  - name: spot
    frequency: 1 week
    count_tolerance_percentage: 10
    data_sample_percentage: 1
    data_tolerance_percentage: 0.5
    xxh64sum_command: xxhsum -H64
  - name: extract
    frequency: 3 months

bootstrap:
  store_config_files: true
